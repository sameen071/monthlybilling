<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profit & Loss Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRmNDZlNSI+PHBhdGggZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMxNy41MiAyIDEyIDJ6bTAgMThjLTQuNDEgMC04LTMuNTktOC04czMuNTktOCA4LTggOCAzLjU5IDggOC0zLjU5IDgtOCA4em0uMzEtOC44NmMxLjA3LS4xNiAxLjctLjYxIDEuNy0xLjM0IDAtMS4wNC0uODMtMS42Ni0yLjI3LTEuNjZINzZ2MmgyLjk0Yy44NCAwIDEuMjQuMjggMS4yNC42NCAwIC4zOS0uNDIuNjUtMS4xOS42N0gxMXYtMkg5djJoLS4zMUM3LjYyIDExLjE0IDcgMTEuNTkgNyAxMi4zMmMwIDEuMDQuODMgMS42NiAyLjI3IDEuNjZIMTFWMTRoMnYtMmgyYy44NCAwIDEuMjQtLjI4IDEuMjQtLjY0IDAtLjM5LS40Mi0uNjUtMS4xOS0uNjdMMTIuMzEgMTEuMTR6Ii8+PC9zdmc+">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #4f46e5, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .card-income::before { background-color: var(--success-color); }
        .card-expense::before { background-color: var(--danger-color); }
        .card-profit::before { background: linear-gradient(to right, #4f46e5, #8b5cf6); }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .card h3 {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card p {
            font-size: 2.5rem;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .income { color: var(--success-color); }
        .expense { color: var(--danger-color); }
        .profit { color: var(--primary-color); }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .form-section, .table-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-main);
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 1rem;
            background-color: #f9fafb;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: #fff;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, var(--primary-color), #6366f1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.3);
        }

        button:hover {
            background: linear-gradient(to right, var(--primary-hover), #4f46e5);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #f3f4f6;
        }

        th {
            background-color: #f9fafb;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        th:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
        th:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f9fafb;
            transform: scale(1.01);
        }

        .type-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-income {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }

        .type-expense {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }
        
        /* Delete Button */
        .btn-delete {
            background: transparent;
            color: var(--danger-color);
            box-shadow: none;
            width: auto;
            padding: 8px 12px;
            font-size: 0.9rem;
            border: 1px solid var(--danger-color);
        }
        .btn-delete:hover {
            background: var(--danger-color);
            color: white;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TechMaster Financials</h1>
        <p style="color: var(--text-muted);">Track your income and expenses seamlessly</p>
    </div>
    
    <div class="dashboard">
        <div class="card card-income">
            <h3>Total Income</h3>
            <p id="total-income" class="income">Rs. 0.00</p>
        </div>
        <div class="card card-expense">
            <h3>Total Expense</h3>
            <p id="total-expense" class="expense">Rs. 0.00</p>
        </div>
        <div class="card card-profit">
            <h3>Net Profit / Loss</h3>
            <p id="net-profit" class="profit">Rs. 0.00</p>
        </div>
    </div>

    <div class="main-content">
        <div class="form-section">
            <h3 class="section-title">Add New Transaction</h3>
            
            <div class="input-group">
                <label for="desc">Description</label>
                <input type="text" id="desc" placeholder="e.g. SSD Sale, Electricity Bill">
            </div>
            
            <div class="input-group">
                <label for="amount">Amount (LKR)</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01">
            </div>
            
            <div class="input-group">
                <label for="type">Transaction Type</label>
                <select id="type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            
            <button onclick="addTransaction()">+ Add Record</button>
            <div style="margin-top: 15px;">
                <button onclick="backupToEmail()" style="background: linear-gradient(to right, #10b981, #059669); font-size: 1rem; padding: 12px;">📧 Backup Data to Email</button>
            </div>
        </div>

        <div class="table-section">
            <h3 class="section-title">Transaction History</h3>
            <div class="table-container">
                <table id="transaction-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Empty state will be shown initially by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize from local storage or empty array
    let transactions = JSON.parse(localStorage.getItem('posTransactions')) || [];

    // Format currency
    const formatCurrency = (amount) => {
        return new Intl.NumberFormat('en-LK', { style: 'currency', currency: 'LKR' }).format(amount).replace('LKR', 'Rs.').trim();
    };

    function addTransaction() {
        const descInput = document.getElementById('desc');
        const amountInput = document.getElementById('amount');
        const typeInput = document.getElementById('type');

        const desc = descInput.value.trim();
        const amount = parseFloat(amountInput.value);
        const type = typeInput.value;

        if (desc === '' || isNaN(amount) || amount <= 0) {
            alert("Please enter a valid description and an amount greater than 0.");
            return;
        }

        const transaction = { 
            id: Date.now(), 
            desc, 
            amount, 
            type 
        };
        
        transactions.push(transaction);
        saveData();
        
        // Reset form
        descInput.value = '';
        amountInput.value = '';
        descInput.focus();
    }

    function deleteTransaction(id) {
        if(confirm("Are you sure you want to delete this transaction?")) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('posTransactions', JSON.stringify(transactions));
        updateDashboard();
        updateTable();
    }

    function updateDashboard() {
        let income = 0;
        let expense = 0;

        transactions.forEach(t => {
            if (t.type === 'income') income += t.amount;
            else expense += t.amount;
        });

        const profit = income - expense;

        document.getElementById('total-income').innerText = formatCurrency(income);
        document.getElementById('total-expense').innerText = formatCurrency(expense);
        
        const profitEl = document.getElementById('net-profit');
        profitEl.innerText = formatCurrency(profit);
        
        // Dynamic color for profit/loss
        if(profit > 0) {
            profitEl.style.color = 'var(--success-color)';
        } else if (profit < 0) {
            profitEl.style.color = 'var(--danger-color)';
        } else {
            profitEl.style.color = 'var(--primary-color)';
        }
    }

    function updateTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";

        if (transactions.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No transactions added yet.</td></tr>`;
            return;
        }

        // Show newest first
        [...transactions].reverse().forEach(t => {
            const badgeClass = t.type === 'income' ? 'type-income' : 'type-expense';
            const amountColor = t.type === 'income' ? 'var(--success-color)' : 'var(--danger-color)';
            const operator = t.type === 'income' ? '+' : '-';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${t.desc}</strong></td>
                <td><span class="type-badge ${badgeClass}">${t.type}</span></td>
                <td style="color: ${amountColor}; font-weight: 600;">${operator} ${formatCurrency(t.amount)}</td>
                <td><button class="btn-delete" onclick="deleteTransaction(${t.id})">Delete</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Initial render
    updateDashboard();
    updateTable();

    function backupToEmail() {
        if (transactions.length === 0) {
            alert("No data to backup yet.");
            return;
        }
        
        let csvContent = "Date, Description, Type, Amount (LKR)\n";
        csvContent += "----------------------------------------\n";
        
        let totalIn = 0;
        let totalOut = 0;
        
        transactions.forEach(t => {
            let date = new Date(t.id).toLocaleDateString();
            csvContent += `${date} | ${t.desc} | ${t.type.toUpperCase()} | Rs. ${t.amount}\n`;
            if (t.type === 'income') totalIn += t.amount;
            else totalOut += t.amount;
        });
        
        csvContent += "----------------------------------------\n";
        csvContent += `Total Income: Rs. ${totalIn}\n`;
        csvContent += `Total Expense: Rs. ${totalOut}\n`;
        csvContent += `Net Profit/Loss: Rs. ${totalIn - totalOut}\n`;
        
        const subject = encodeURIComponent("TechMaster Financials Backup");
        const body = encodeURIComponent("Here is your latest transaction backup:\n\n" + csvContent);
        
        // Open default email client
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    // Register Service Worker for Offline Use
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered with scope: ', reg.scope))
                .catch(err => console.error('Service worker registration failed: ', err));
        });
    }
</script>

</body>
</html>
